{% extends 'common/base.html' %}
{% load static %}
{% block content %}

<div class="auth-center-wrap">
    <div class="glass-effect auth-box text-center">

        <div class="mb-4">
            <i class="fas fa-key fa-2x mb-3" style="color: var(--accent-purple);"></i>
            <h2 class="brand-font mb-1" style="color: var(--accent-cyan); letter-spacing: 4px;">New Password</h2>
            <p class="text-secondary small">Choose a strong new password for your account.</p>
        </div>

        <form action="{% url 'password_reset_confirm' uidb64=uidb64 token=token %}" method="post">
            {% csrf_token %}
            <div class="form-group mb-4 text-left">
                <label class="small text-secondary mb-2 d-block" style="letter-spacing: 1px; text-transform: uppercase;">New Password</label>
                <input type="password" class="form-control cryonix-input py-3" name="password1" placeholder="Enter new password" required>
            </div>
            <div class="form-group mb-4 text-left">
                <label class="small text-secondary mb-2 d-block" style="letter-spacing: 1px; text-transform: uppercase;">Confirm Password</label>
                <input type="password" class="form-control cryonix-input py-3" name="password2" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="cryonix-btn cryonix-btn-primary w-100 py-3">
                <i class="fas fa-check mr-2"></i> Set New Password
            </button>
        </form>

        <div class="mt-4 pt-3 border-top border-secondary">
            <a href="{% url 'login_user' %}" class="text-secondary small" style="text-decoration: none; letter-spacing: 1px;">
                <i class="fas fa-arrow-left mr-1"></i> Back to Login
            </a>
        </div>
    </div>
</div>

{% if messages %}
{% for msg in messages %}
<div class="position-fixed" style="bottom: 20px; right: 20px; z-index: 1050;">
    <div class="glass-effect p-3" style="border-left: 4px solid var(--accent-cyan); color: white;">
        <i class="fas fa-info-circle mr-2" style="color: var(--accent-cyan);"></i> {{ msg }}
    </div>
</div>
{% endfor %}
{% endif %}

<style>
    .auth-center-wrap {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 1rem;
    }
    .auth-box {
        width: 100%;
        max-width: 460px;
        padding: 3rem;
    }
</style>
{% endblock %}
