<!DOCTYPE html>
<html lang="en">
    {% load static  %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Aroma Shop - Manager Dashboard</title>
	<link rel="icon" href="img/Fevicon.png" type="image/png">
  <link rel="stylesheet" href="{%static 'aroma-master/aroma-master/vendors/bootstrap/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{%static 'aroma-master/aroma-master/vendors/fontawesome/css/all.min.css' %}">
	<link rel="stylesheet" href="{%static 'aroma-master/aroma-master/vendors/themify-icons/themify-icons.css' %}">
  <link rel="stylesheet" href="{%static 'aroma-master/aroma-master/vendors/nice-select/nice-select.css' %}">
  <link rel="stylesheet" href="{%static 'aroma-master/aroma-master/vendors/owl-carousel/owl.theme.default.min.css' %}">
  <link rel="stylesheet" href="{%static 'aroma-master/aroma-master/vendors/owl-carousel/owl.carousel.min.css' %}">
  <link rel="stylesheet" href="{%static 'aroma-master/aroma-master/css/style.css' %}">
  <link rel="stylesheet" href="{%static 'css/cryonix_theme.css' %}">
</head>
<body>
  <!--================ Start Header Menu Area =================-->
<header class="header_area sticky-top">
    <div class="main_menu">
      <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container-fluid px-lg-5">
          <a class="navbar-brand brand-font h3 mb-0" href="{% url 'adminhome' %}" style="color: var(--accent-cyan); font-weight: 800;">
            CRY<span style="color: var(--accent-purple);">ONIX</span> <small class="text-white ml-2" style="font-size: 0.6em; letter-spacing: 2px;">ADMIN</small>
          </a>
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <div class="collapse navbar-collapse offset" id="navbarSupportedContent">
            <ul class="nav navbar-nav menu_nav ml-auto mr-auto">
              <li class="nav-item"><a class="nav-link" href="{% url 'adminhome' %}">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="{% url 'view' %}">Categories</a></li>
              <li class="nav-item"><a class="nav-link" href="{% url 'view_prodct' %}">Products</a></li>
              <li class="nav-item"><a class="nav-link" href="{% url 'userorder_for_admin' %}">Orders</a></li>
            </ul>
            
            <ul class="nav-shop">
              <li class="nav-item">
                <a href="{% url 'logout' %}" class="cryonix-btn cryonix-btn-outline" style="padding: 8px 20px;">
                  <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
  </header>
  <!--================ End Header Menu Area =================-->

  {% block content %}
  {% endblock %}

  <!--================ Start Footer Area =================-->
  <footer class="footer footer-bottom " style="padding: 10px 0;">
		<div class="footer-bottom">
			<div class="container">
				<div class="row d-flex">
					<p class="col-lg-12 footer-text text-center">
Copyright &copy;<script>document.write(new Date().getFullYear());</script> All rights reserved | Manager Dashboard Area
</p>
				</div>
			</div>
		</div>
	</footer>
  <!--================ End Footer Area =================-->

  <script src="{%static 'aroma-master/aroma-master/vendors/jquery/jquery-3.2.1.min.js' %}"></script>
  <script src="{%static 'aroma-master/aroma-master/vendors/bootstrap/bootstrap.bundle.min.js' %}"></script>
  <script src="{%static 'aroma-master/aroma-master/vendors/skrollr.min.js' %}"></script>
  <script src="{%static 'aroma-master/aroma-master/vendors/owl-carousel/owl.carousel.min.js' %}"></script>
  <script src="{%static 'aroma-master/aroma-master/vendors/nice-select/jquery.nice-select.min.js' %}"></script>
  <script src="{%static 'aroma-master/aroma-master/vendors/jquery.ajaxchimp.min.js' %}"></script>
  <script src="{%static 'aroma-master/aroma-master/vendors/mail-script.js' %}"></script>
  <script src="{%static 'aroma-master/aroma-master/js/main.js' %}"></script>
</body>
</html>
