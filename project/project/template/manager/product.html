{% extends 'manager/page1.html' %}
{% load static %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-5 mb-5">
    <div class="card shadow-lg p-4" style="width: 500px; border-radius: 15px; background: white;">
        <h3 class="text-center mb-3">Add Product</h3>
        <form action="{% url 'add_product' %}" enctype="multipart/form-data" method="post">
            {% csrf_token %}
            <div class="mb-3 form-group">
                <label>Product Image</label>
                <input type="file" class="form-control" name="image" required>
            </div>
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="Name" class="form-control" required> 
            </div>  
            <div class="mb-3">
                <label>Price</label>
                <input type="number" name="price" class="form-control" step="0.01" required> 
            </div>
            <div class="mb-3">
                <label>Stock</label>
                <input type="number" name="stock" class="form-control" required> 
            </div>
            <div class="mb-3">
                <label>Category</label>
                <select name="category" class="form-control" required>
                    <option value="">Select Category</option>
                    {% for i in c %}
                    <option value="{{i.id}}">{{i.Name}}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>Description</label><br>
                <textarea name="description" rows="4" class="form-control" required></textarea>
            </div>
            <div class="mb-3">
                <input type="submit" class="form-control btn btn-success" value="Submit">
            </div>
        </form>

        <div class="text-center">
            <a href="{% url 'adminhome' %}" class="btn btn-info form-control">Back</a>
        </div>
        
        {% if messages %}
        {% for msg in messages %}
        <script>alert('{{msg}}')</script>
        {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
