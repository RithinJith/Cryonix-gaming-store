{% extends 'user/page1.html' %}
{% block content %}
<div class="container text-center py-5 mt-5 mb-5">
    <div class="mb-4">
        <i class="fas fa-check-circle text-success fa-5x"></i>
    </div>
    <h1 class="display-4 font-weight-bold mb-3">Order Successful!</h1>
    <div class="card shadow-sm border-0 max-width-500 mx-auto p-4 bg-light">
        <div class="row mb-2">
            <div class="col-6 text-right text-muted">Total Amount:</div>
            <div class="col-6 text-left font-weight-bold">₹{{order.total_amount}}</div>
        </div>
        <div class="row mb-4">
            <div class="col-6 text-right text-muted">Order Date:</div>
            <div class="col-6 text-left font-weight-bold">{{order.orderdate}}</div>
        </div>
        <div class="mt-2">
            <a href="{% url 'userhome' %}" class="btn btn-primary btn-lg px-5">Continue Shopping</a>
        </div>
    </div>
</div>

<style>
    .max-width-500 {
        max-width: 500px;
    }
</style>
{% endblock %}
