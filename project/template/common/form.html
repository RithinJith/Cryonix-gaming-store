{% extends 'common/base.html' %}
{% load static %}
{% block content %}
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem;
            background: radial-gradient(circle at top right, rgba(157, 0, 255, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(0, 207, 255, 0.05), transparent);
        }
        
        .auth-card {
            width: 100%;
            max-width: 1000px;
            padding: 4rem;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        textarea.cryonix-input {
            grid-column: span 2;
            min-height: 120px;
        }

        .submit-container {
            grid-column: span 2;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            textarea.cryonix-input, .submit-container { grid-column: span 1; }
            .auth-card { padding: 2rem; }
        }
    </style>

    <div class="auth-container">
        <div class="auth-card glass-effect">
            <div class="text-center mb-5">
                <h2 class="brand-font mb-2" style="color: var(--accent-cyan); font-weight: 900; letter-spacing: 5px;">CREATE ACCOUNT</h2>
                <p class="text-secondary small uppercase letter-spacing-2">Initialize your Cryonix Elite Profile</p>
            </div>
            
            <form action="{% url 'form' %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %} 
                <div class="form-grid">
                    <div>
                        <label class="form-label">FirstName</label>
                        <input type="text" class="form-control cryonix-input" name="FirstName" placeholder="First Name" required>
                    </div>
                    <div>
                        <label class="form-label">LastName</label>
                        <input type="text" class="form-control cryonix-input" name="LastName" placeholder="Last Name" required>
                    </div>
                    <div>
                        <label class="form-label">UserName</label>
                        <input type="text" class="form-control cryonix-input" name="username" placeholder="Username" required>
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control cryonix-input" name="email" placeholder="Email Address" required>
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control cryonix-input" name="password" placeholder="Password" required>
                    </div>
                    <div>
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control cryonix-input" name="confirmPassword" placeholder="Confirm Password" required>
                    </div>
                    <div>
                        <label class="form-label">City</label>
                        <input type="text" class="form-control cryonix-input" name="city" placeholder="City" required>
                    </div>
                    <div>
                        <label class="form-label">State</label>
                        <input type="text" class="form-control cryonix-input" name="state" placeholder="State" required>
                    </div>
                    <div>
                        <label class="form-label">Phone</label>
                        <input type="number" class="form-control cryonix-input" name="phone" placeholder="Phone Number" required>
                    </div>
                    <div>
                        <label class="form-label">Postal Code</label>
                        <input type="number" class="form-control cryonix-input" name="postal_code" placeholder="Postal Code" required>
                    </div>
                    <div style="grid-column: span 2;">
                        <label class="form-label">Address</label>
                        <textarea class="form-control cryonix-input" name="address" placeholder="Residential Address" required></textarea>
                    </div>
                    
                    <div class="submit-container">
                        <button type="submit" class="cryonix-btn cryonix-btn-primary w-100 py-3 shadow-lg">
                            <i class="fas fa-user-plus mr-2"></i>Submit</button>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <p class="text-secondary small">Already have an account? <a href="{% url 'login_user' %}" class="brand-font text-cyan" style="text-decoration: none;">Login Now</a></p>
                </div>
            </form>
        </div>
    </div>

    {% if messages %}
    {% for msg in messages %}
    <div class="position-fixed" style="top: 110px; left: 50%; transform: translateX(-50%); z-index: 9999;">
        <div class="glass-effect p-3 border-cyan" style="border-left: 4px solid var(--accent-cyan); color: white;">
            <i class="fas fa-info-circle mr-2 text-cyan"></i> {{msg}}
        </div>
    </div>
    {% endfor %}
    {% endif %}

    <style>
        .text-cyan { color: var(--accent-cyan); }
    </style>
{% endblock %}
