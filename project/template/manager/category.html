{% extends 'manager/page1.html' %}
{% block content %}
<div class="container justify-content-center align-items-center d-flex vh-100 mt-4 mb-3">
    <div class="glass-effect p-4 shadow" style="width: 350px;">
        <h3 class="brand-font text-center mb-4 text-cyan">Add Category</h3>
        <form action="{% url 'category' %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="text-white">Name</label>
                <input type="text" name="Name" class="form-control cryonix-input" required> 
            </div>
            <div class="mb-3">
                <label class="text-white">Description</label><br>
                <textarea name="description" rows="4" class="form-control cryonix-input" required></textarea>
            </div>
            <div class="mb-3">
                <input type="submit" class="cryonix-btn cryonix-btn-primary w-100" value="Submit">
            </div>
        </form>

        <div class="text-center">
            <a href="{% url 'adminhome' %}" class="cryonix-btn cryonix-btn-outline w-100">Back</a>
        </div>

        {% if messages %}
        {% for msg in messages %}
        <div class="position-fixed" style="top: 110px; left: 50%; transform: translateX(-50%); z-index: 9999;">
            <div class="glass-effect p-3" style="border-left: 4px solid var(--accent-cyan); color: white; min-width: 250px;">
                <i class="fas fa-info-circle mr-2 text-cyan"></i> {{msg}}
            </div>
        </div>
        {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
