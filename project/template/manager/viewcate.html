{% extends 'manager/page1.html' %}
{% load static %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-4 mb-5">
    <div class="glass-effect p-4" style="max-width: 800px; width: 100%;">
        <h3 class="brand-font text-center mb-4 text-cyan">View Categories</h3>
        <div class="table-responsive">
            <table class="table table-dark-custom text-white">
                <thead>
                    <tr class="text-cyan brand-font" style="font-size: 0.8rem;">
                        <th>Name</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in data %}
                    <tr>
                        <td>{{i.Name}}</td>
                        <td>{{i.Description}}</td>
                        <td>
                            <div class="d-flex gap-2">
                                <a href="{% url 'editdata' i.id %}" class="cryonix-btn cryonix-btn-outline py-1 px-3" style="font-size: 0.7rem; color: #ffc107; border-color: #ffc107;">Edit</a>
                                <a href="{% url 'delete' i.id %}" onclick="return confirm('delete?')" class="cryonix-btn cryonix-btn-outline py-1 px-3" style="font-size: 0.7rem; color: #ff4444; border-color: #ff4444;">Delete</a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4">
            <a href="{% url 'adminhome' %}" class="cryonix-btn cryonix-btn-outline w-100">Back</a>
        </div>
    </div>
</div>
{% endblock %}
