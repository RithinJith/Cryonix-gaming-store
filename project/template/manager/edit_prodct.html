{% extends 'manager/page1.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-5 mb-5">
    <div class="glass-effect p-4 shadow-lg" style="width: 550px;">
        <h3 class="brand-font text-center mb-4 text-cyan">Edit Product</h3>
        
        {% for k in pdata %} 
        <form action="{% url 'edit_prodct' k.id %}" enctype="multipart/form-data" method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-white">Product Photo</label><br>
                {% if k.image %}
                <img src="{{k.image.url}}" class="mb-2 shadow-sm" width="150" style="border: 1px solid var(--accent-cyan); border-radius: 8px; padding: 5px;">
                {% endif %}
                <input type="file" name="image" class="form-control cryonix-input">
            </div>

            <div class="mb-3">
                <label class="form-label text-white">Name</label>
                <input type="text" name="Name" value="{{k.Name}}" class="form-control cryonix-input" required>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-white">Price</label>
                    <input type="text" name="price" value="{{k.Price}}" class="form-control cryonix-input" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-white">Stock</label>
                    <input type="number" name="stock" value="{{k.stock}}" class="form-control cryonix-input" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-white">Category</label>
                <select name="category" class="form-control cryonix-input" required>
                    <option value="{{k.category_id}}" class="bg-dark">{{k.category.Name}}</option>
                    {% for i in c %}
                    {% if i.id != k.category_id %}
                    <option value="{{i.id}}" class="bg-dark">{{i.Name}}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label text-white">Description</label>
                <textarea name="description" rows="4" class="form-control cryonix-input" required>{{k.Description}}</textarea>
            </div>

            <div class="mb-3">
                <button type="submit" class="cryonix-btn cryonix-btn-primary w-100">Submit</button>
            </div>
        </form>
        {% endfor %}

        <div class="text-center mt-3">
            <a href="{% url 'view_prodct' %}" class="cryonix-btn cryonix-btn-outline w-100">Back</a>
        </div>
    </div>
</div>
{% endblock %}
