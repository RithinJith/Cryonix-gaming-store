{% extends 'manager/page1.html' %}
{% load static %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-4 mb-5">
    <div class="card shadow-lg p-4" style="width: 800px; border-radius: 15px; background: white;">
        <h3 class="text-center mb-3">View Products</h3>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Product_Photo</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Category</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in data %}
                    <tr>
                        <td>
                            {% if i.image %}
                                <img src="{{ i.image.url }}" width="80" height="80" style="object-fit: cover;">
                            {% else %}
                                No Image
                            {% endif %}
                        </td>
                        <td>{{i.Name}}</td>
                        <td>{{i.Price}}</td>
                        <td>{{i.stock}}</td>
                        <td>{{i.category}}</td>
                        <td>
                            <div class="d-flex">
                                <a href="{% url 'edit_prodct' i.id %}" class="btn btn-sm btn-warning mr-2">Edit</a>
                                <a href="{% url 'delete_prodct' i.id %}" onclick="return confirm('delete?')" class="btn btn-sm btn-danger">Delete</a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="text-center mt-3">
            <a href="{% url 'adminhome' %}" class="btn btn-info form-control">Back</a>
        </div>
    </div>
</div>
{% endblock %}
