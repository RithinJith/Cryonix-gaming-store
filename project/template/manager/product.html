{% extends 'manager/page1.html' %}
{% load static %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-5 mb-5">
    <div class="glass-effect p-4 shadow-lg" style="width: 500px;">
        <h3 class="brand-font text-center mb-4 text-cyan">Add Product</h3>
        <form action="{% url 'add_product' %}" enctype="multipart/form-data" method="post">
            {% csrf_token %}
            <div class="mb-3 form-group">
                <label class="text-white">Product Image</label>
                <input type="file" class="form-control cryonix-input" name="image" required>
            </div>
            <div class="mb-3">
                <label class="text-white">Name</label>
                <input type="text" name="Name" class="form-control cryonix-input" required> 
            </div>  
            <div class="mb-3">
                <label class="text-white">Price</label>
                <input type="number" name="price" class="form-control cryonix-input" step="0.01" required> 
            </div>
            <div class="mb-3">
                <label class="text-white">Stock</label>
                <input type="number" name="stock" class="form-control cryonix-input" required> 
            </div>
            <div class="mb-3">
                <label class="text-white">Category</label>
                <select name="category" class="form-control cryonix-input" required>
                    <option value="" class="bg-dark">Select Category</option>
                    {% for i in c %}
                    <option value="{{i.id}}" class="bg-dark">{{i.Name}}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="text-white">Description</label><br>
                <textarea name="description" rows="4" class="form-control cryonix-input" required></textarea>
            </div>
            <div class="mb-3">
                <input type="submit" class="cryonix-btn cryonix-btn-primary w-100" value="Submit">
            </div>
        </form>

        <div class="text-center">
            <a href="{% url 'adminhome' %}" class="cryonix-btn cryonix-btn-outline w-100">Back</a>
        </div>
        
    {% if messages %}
    {% for msg in messages %}
    <div class="position-fixed" style="top: 110px; left: 50%; transform: translateX(-50%); z-index: 9999;">
        <div class="glass-effect p-3" style="border-left: 4px solid var(--accent-cyan); color: white; min-width: 250px;">
            <i class="fas fa-info-circle mr-2 text-cyan"></i> {{msg}}
        </div>
    </div>
    {% endfor %}
    {% endif %}
    </div>
</div>
{% endblock %}
