{% extends 'manager/page1.html' %}
{% block content %}
<div class="container justify-content-center align-items-center d-flex mt-5 mb-5">
    <div class="glass-effect p-4 shadow" style="width: 400px;">
        <h3 class="brand-font text-center mb-4 text-cyan">Edit Category</h3>
        
        {% for k in edata %}   
        <form action="{% url 'editdata' k.id %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="text-white">Name</label>
                <input type="text" name="Name" class="form-control cryonix-input" value="{{k.Name}}" required> 
            </div>
            
            <div class="mb-3">
                <label class="text-white">Description</label>
                <textarea name="Description" rows="4" class="form-control cryonix-input" required>{{k.Description}}</textarea>
            </div>
            
            <div class="mb-3">
                <button type="submit" class="cryonix-btn cryonix-btn-primary w-100">Submit</button>
            </div>
        </form>
        {% endfor %}

        <div class="text-center mt-3">
            <a href="{% url 'view' %}" class="cryonix-btn cryonix-btn-outline w-100">Back</a>
        </div>
    </div>
</div>
{% endblock %}
