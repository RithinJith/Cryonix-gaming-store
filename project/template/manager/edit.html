{% extends 'manager/page1.html' %}
{% block content %}
<div class="container justify-content-center align-items-center d-flex mt-5 mb-5">
    <div class="card p-4 shadow" style="width: 400px; border-radius: 10px;">
        <h3 class="text-center mb-4">Edit Category</h3>
        
        {% for k in edata %}   
        <form action="{% url 'editdata' k.id %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="Name" class="form-control" value="{{k.Name}}" required> 
            </div>
            
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="Description" rows="4" class="form-control" required>{{k.Description}}</textarea>
            </div>
            
            <div class="mb-3">
                <button type="submit" class="btn btn-success w-100">Submit</button>
            </div>
        </form>
        {% endfor %}

        <div class="text-center mt-2">
            <a href="{% url 'view' %}" class="btn btn-info w-100">Back</a>
        </div>
    </div>
</div>
{% endblock %}
